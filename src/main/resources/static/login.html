<!DOCTYPE html>

<html>

<head>
	<meta charset="UTF-8">
	<title>Login - My Store</title>

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

	<style>
		body {
			margin: 0;
			font-family: Segoe UI, Arial, sans-serif;
			background: linear-gradient(135deg, #141e30, #243b55);
			height: 100vh;
		}

		/* NAVBAR */

		nav {
			background: #111;
			color: white;
			padding: 15px 40px;
			display: flex;
			justify-content: space-between;
			align-items: center;
		}

		nav h2 {
			margin: 0;
			color: white;
		}

		nav a {
			color: white;
			text-decoration: none;
			margin-left: 20px;
			font-weight: 500;
		}

		nav a:hover {
			color: #ff6a00;
		}

		/* LOGIN SECTION */

		.login-wrapper {
			display: flex;
			justify-content: center;
			align-items: center;
			height: 85vh;
		}

		/* GLASS CARD */

		.login-card {
			width: 380px;
			padding: 40px;
			border-radius: 12px;
			background: rgba(255, 255, 255, 0.08);
			backdrop-filter: blur(10px);
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
			color: white;
		}

		/* TITLE */

		.login-card h2 {
			text-align: center;
			margin-bottom: 30px;
		}

		/* INPUT */

		.input-group {
			margin-bottom: 20px;
			position: relative;
		}

		.input-group input {
			width: 100%;
			padding: 12px;
			border: none;
			border-radius: 6px;
			outline: none;
			background: rgba(255, 255, 255, 0.15);
			color: white;
			font-size: 14px;
		}

		.input-group input::placeholder {
			color: #ddd;
		}

		/* PASSWORD EYE */

		.eye {
			position: absolute;
			right: 10px;
			top: 12px;
			cursor: pointer;
			color: #ddd;
		}

		/* BUTTON */

		button {
			width: 100%;
			padding: 12px;
			border: none;
			border-radius: 6px;
			background: #ff6a00;
			color: white;
			font-size: 16px;
			cursor: pointer;
			transition: .3s;
		}

		button:hover {
			background: #ff4500;
		}

		/* MESSAGE */

		#message {
			margin-top: 15px;
			text-align: center;
			font-size: 14px;
		}

		/* SPINNER */

		.spinner {
			width: 25px;
			height: 25px;
			border: 3px solid #ccc;
			border-top: 3px solid #ff6a00;
			border-radius: 50%;
			animation: spin 1s linear infinite;
			display: none;
			margin: 15px auto;
		}

		@keyframes spin {
			100% {
				transform: rotate(360deg);
			}
		}

		/* REGISTER */

		.register {
			text-align: center;
			margin-top: 20px;
			font-size: 14px;
		}

		.register a {
			color: #ff6a00;
			text-decoration: none;
			font-weight: bold;
		}
	</style>

</head>

<body>

	<nav>

		<h2>My Store</h2>

		<div>
			<a href="/index.html">Home</a>
			<a href="/register.html">Register</a>
			<a href="/cart.html">Cart</a>
		</div>

	</nav>

	<div class="login-wrapper">

		<div class="login-card">

			<h2>Login</h2>

			<div class="input-group">
				<input id="email" type="email" placeholder="Enter Email">
			</div>

			<div class="input-group">
				<input id="password" type="password" placeholder="Enter Password">
				<span class="eye" onclick="togglePassword()">
					<i class="fa-solid fa-eye"></i>
				</span>
			</div>

			<button onclick="login()">Login</button>

			<div id="spinner" class="spinner"></div>

			<p id="message"></p>

			<div class="register">
				New here? <a href="/register.html">Create an account</a>
			</div>

		</div>

	</div>

	<script>

		const API = "http://localhost:8080";

		/* PASSWORD SHOW/HIDE */

		function togglePassword() {

			const pass = document.getElementById("password");

			if (pass.type === "password") {
				pass.type = "text";
			} else {
				pass.type = "password";
			}

		}

		/* LOGIN FUNCTION */

		function login() {

			const email = document.getElementById("email").value;
			const password = document.getElementById("password").value;
			const message = document.getElementById("message");
			const spinner = document.getElementById("spinner");

			message.innerText = "";
			message.style.color = "red";

			if (!email || !password) {
				message.innerText = "Email and Password required!";
				return;
			}

			spinner.style.display = "block";

			fetch(API + "/api/auth/login", {
				method: "POST",
				headers: {
					"Content-Type": "application/json"
				},
				body: JSON.stringify({
					email: email,
					password: password
				})
			})

				.then(res => res.json())

				.then(data => {

					spinner.style.display = "none";

					if (data.token) {

						localStorage.setItem("token", data.token);

						message.style.color = "lightgreen";
						message.innerText = "Login successful! Redirecting...";

						setTimeout(() => {
							window.location.href = "/index.html";
						}, 1000);

					} else {

						message.innerText = "Token not received from server";

					}

				})

				.catch(err => {

					spinner.style.display = "none";
					message.innerText = "Login error";

					console.error(err);

				});

		}

	</script>

</body>

</html>
