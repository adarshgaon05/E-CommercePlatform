<!DOCTYPE html>

<html>

<head>
	<meta charset="UTF-8">
	<title>MyStore - Online Shopping</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<style>
		body {
			font-family: Arial, sans-serif;
			margin: 0;
			background: #f3f3f3;
		}

		/* NAVBAR */

		nav {
			background: #222;
			color: white;
			padding: 15px 30px;
			display: flex;
			justify-content: space-between;
			align-items: center;
		}

		nav a {
			color: white;
			margin-left: 15px;
			text-decoration: none;
			font-weight: bold;
		}

		.search-box {
			padding: 8px 12px;
			border-radius: 20px;
			border: none;
			outline: none;
			width: 250px;
		}

		/* BANNER */

		.banner-container {
			overflow: hidden;
			padding: 20px 30px;
			background: #f1f3f6;
		}

		.banner-track {
			display: flex;
			gap: 15px;
			transition: transform .6s linear;
		}

		.banner-track img {
			width: 40%;
			height: 180px;
			object-fit: cover;
			border-radius: 8px;
		}

		.container {
			padding: 30px;
		}

		.product-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
			gap: 25px;
			margin-top: 20px;
		}

		.product-card {
			background: white;
			padding: 15px;
			border-radius: 10px;
			box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
			transition: .3s;
		}

		.product-card:hover {
			transform: translateY(-5px);
		}

		.product-img {
			width: 100%;
			height: 220px;
			object-fit: contain;
			background: #fff;
			padding: 10px;
			border-bottom: 1px solid #eee;
		}

		/* RATING */

		.rating {
			color: #ffb400;
			font-size: 14px;
			margin: 5px 0;
		}

		.rating-count {
			color: #777;
			font-size: 12px;
		}

		/* PRICE */

		.price-section {
			display: flex;
			align-items: center;
			gap: 8px;
			margin-top: 5px;
		}

		.price {
			color: green;
			font-size: 18px;
			font-weight: bold;
		}

		.old-price {
			text-decoration: line-through;
			color: #888;
			font-size: 14px;
		}

		.discount {
			color: #2e7d32;
			font-weight: bold;
			font-size: 13px;
		}

		.description {
			color: #555;
			font-size: 14px;
			min-height: 40px;
		}

		button {
			background: #ff6a00;
			color: white;
			border: none;
			padding: 8px 12px;
			border-radius: 5px;
			cursor: pointer;
		}

		button:hover {
			background: #e65c00;
		}

		input[type="number"] {
			width: 60px;
			padding: 5px;
		}

		#message {
			font-weight: bold;
		}
	</style>

</head>

<body>

	<nav>

		<h2>MyStore</h2>

		<input type="text" id="searchInput" class="search-box" placeholder="Search products..."
			onkeyup="searchProducts()">

		<div id="nav-links"></div>

	</nav>

	<!-- BANNER -->

	<div class="banner-container">
		<div class="banner-track" id="bannerTrack">

			<img src="/images/banner1.jpg">
			<img src="/images/banner2.jpg">
			<img src="/images/banner3.jpg">
			<img src="/images/banner4.jpg">
			<img src="/images/banner5.jpg">

			<img src="/images/banner1.jpg">
			<img src="/images/banner2.jpg">
			<img src="/images/banner3.jpg">
			<img src="/images/banner4.jpg">
			<img src="/images/banner5.jpg">

		</div>
	</div>

	<div class="container">

		<h2>All Products</h2>

		<div id="message"></div>

		<div id="product-list" class="product-grid"></div>

	</div>

	<script>

		const API = "http://localhost:8080";

		document.addEventListener("DOMContentLoaded", function () {

			updateNavbar();
			loadProducts();
			startBannerSlider();

		});

		/* NAVBAR */

		function updateNavbar() {

			const nav = document.getElementById("nav-links");
			const token = localStorage.getItem("token");

			if (!token) {

				nav.innerHTML =
					'<a href="/index.html">Home</a>' +
					'<a href="/login.html">Login</a>' +
					'<a href="/register.html">Register</a>';

				return;

			}

			nav.innerHTML =
				'<a href="/index.html">Home</a>' +
				'<a href="/cart.html">Cart</a>' +
				'<a href="#" onclick="logout()">Logout</a>';

		}

		function logout() {

			localStorage.removeItem("token");
			window.location.href = "/login.html";

		}

		/* LOAD PRODUCTS */

		function loadProducts() {

			fetch(API + "/api/products")
				.then(res => res.json())
				.then(data => {

					const container = document.getElementById("product-list");
					container.innerHTML = "";

					data.forEach(product => {

						const imageName = product.imageUrl || "default.jpg";

						let card = `

<div class="product-card">

<img src="/images/${imageName}" class="product-img">

<h3>${product.name}</h3>

<div class="rating">
⭐ ⭐ ⭐ ⭐ ☆
<span class="rating-count">(124)</span>
</div>

<p class="description">${product.description || ""}</p>

<div class="price-section">
<span class="price">₹ ${product.price}</span>
<span class="old-price">₹ ${product.price + 2000}</span>
<span class="discount">20% OFF</span>
</div>
`;

						if (product.quantity > 0) {

							card += `

<input type="number" id="qty-${product.id}" value="1" min="1" max="${product.quantity}">

<button onclick="addToCart(${product.id})">
Add to Cart
</button>

`;

						} else {

							card += `<p style="color:red;">Out of Stock</p>`;

						}

						card += `

<p id="stock-${product.id}" style="font-size:12px;">
Stock: ${product.quantity}
</p>

</div>
`;

						container.innerHTML += card;

					});

				});

		}

		/* ADD TO CART */

		function addToCart(productId) {

			const token = localStorage.getItem("token");

			if (!token) {
				alert("Please login first");
				window.location.href = "login.html";
				return;
			}

			const qtyInput = document.getElementById("qty-" + productId);
			const quantity = parseInt(qtyInput.value);

			fetch(API + "/api/cart/add/" + productId + "?quantity=" + quantity, {
				method: "POST",
				headers: {
					"Authorization": "Bearer " + token
				}
			})
				.then(res => {
					if (!res.ok) throw new Error();
					return res.text();
				})
				.then(() => {

					showMessage("Product added successfully!", "success");

					const stockElement = document.getElementById("stock-" + productId);

					let currentStock = parseInt(stockElement.textContent.split(":")[1]);

					let newStock = currentStock - quantity;

					if (newStock < 0) newStock = 0;

					stockElement.textContent = "Stock: " + newStock;

					qtyInput.max = newStock;
					qtyInput.value = 1;

					if (newStock === 0) {
						qtyInput.disabled = true;
					}

				})
				.catch(() => {

					showMessage("Error adding to cart", "error");

				});

		}

		/* SEARCH PRODUCTS */

		function searchProducts() {

			let input = document.getElementById("searchInput").value.toLowerCase();

			let cards = document.querySelectorAll("#product-list .product-card");

			cards.forEach(function (card) {

				let title = card.querySelector("h3").textContent.toLowerCase();

				if (title.includes(input)) {
					card.style.display = "";
				} else {
					card.style.display = "none";
				}

			});

		}

		/* MESSAGE */

		function showMessage(text, type) {

			const msg = document.getElementById("message");

			msg.innerHTML = text;

			msg.style.color = (type === "success") ? "green" : "red";

			setTimeout(() => {msg.innerHTML = ""}, 2000);

		}

		/* BANNER SLIDER */

		function startBannerSlider() {

			let track = document.getElementById("bannerTrack");
			let position = 0;

			setInterval(() => {

				position++;

				track.style.transform = `translateX(-${position * 20}%)`;

				if (position >= 5) {
					position = 0;
					track.style.transform = "translateX(0)";
				}

			}, 2000);

		}

	</script>

</body>

</html>
