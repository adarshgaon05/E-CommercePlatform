<!DOCTYPE html>

<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Order Success - MyStore</title>

	<style>
		body {
			margin: 0;
			font-family: Segoe UI, Arial, sans-serif;
			background: linear-gradient(135deg, #141e30, #243b55);
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			color: white;
		}

		/* SUCCESS CARD */

		.container {
			background: rgba(255, 255, 255, 0.08);
			backdrop-filter: blur(10px);
			padding: 50px;
			border-radius: 12px;
			text-align: center;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
			width: 420px;
		}

		/* SUCCESS ICON */

		.success {
			font-size: 60px;
			color: #4CAF50;
			animation: pop .6s ease;
		}

		@keyframes pop {
			0% {
				transform: scale(0)
			}

			100% {
				transform: scale(1)
			}
		}

		h1 {
			margin-top: 15px;
			color: #4CAF50;
		}

		p {
			color: #ddd;
			margin-top: 10px;
		}

		/* BUTTON */

		button {
			margin-top: 25px;
			padding: 12px 28px;
			font-size: 16px;
			background: #ff6a00;
			color: white;
			border: none;
			border-radius: 6px;
			cursor: pointer;
			transition: .3s;
		}

		button:hover {
			background: #ff4500;
			transform: translateY(-2px);
		}
	</style>

</head>

<body>

	<div class="container">

		<div class="success">✔</div>

		<h1>Order Placed Successfully</h1>

		<p>Thank you for shopping with <b>MyStore</b>.<br>
			Your order has been confirmed.</p>

		<button onclick="goHome()">Continue Shopping</button>

	</div>

	<script>

		function goHome() {
			window.location.href = "/index.html";
		}

	</script>

</body>

</html>
