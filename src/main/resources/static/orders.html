<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>My Orders</title>

<link rel="stylesheet" href="/css/style.css">

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

nav{
background:#222;
color:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
margin-left:15px;
text-decoration:none;
font-weight:bold;
}
.order-card{
background:white;
padding:20px;
margin-bottom:25px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.order-card h3{
margin-bottom:10px;
}

.order-info{
font-size:14px;
color:#555;
margin-bottom:15px;
}

.order-item{
display:flex;
align-items:center;
gap:15px;
margin-bottom:10px;
padding:10px 0;
border-bottom:1px solid #eee;
}

.order-item img{
width:60px;
height:60px;
object-fit:contain;
background:#fff;
border:1px solid #eee;
padding:5px;
}

.total{
margin-top:10px;
font-weight:bold;
font-size:16px;
color:#2e7d32;
}

</style>
</head>

<body>

<nav>

<h2>My Store</h2>

<div>
<a href="/index.html">Home</a>
<a href="/cart.html">Cart</a>
<a href="/orders.html">Orders</a>
</div>

</nav>

<div class="orders-container">

<h2>My Orders</h2>

<div id="orders">Loading orders...</div>

</div>

<script>

const API="http://localhost:8080";

/* TOKEN CHECK */

const token=localStorage.getItem("token");

if(!token){
alert("Please login first");
window.location.href="/login.html";
}

/* LOAD ORDERS */

async function loadOrders(){

try{

const res=await fetch(API+"/api/orders/my-orders",{
method:"GET",
headers:{
"Authorization":"Bearer "+token,
"Content-Type":"application/json"
}
});

if(res.status===401 || res.status===403){

alert("Session expired. Please login again.");

localStorage.removeItem("token");

window.location.href="/login.html";

return;

}

const data=await res.json();

/* SORT ORDERS (LATEST FIRST) */

data.sort((a,b)=> new Date(b.createdAt) - new Date(a.createdAt));

let html="";

if(data.length===0){

html="<p>No orders found</p>";

}else{

data.forEach(order=>{

let items="";

const orderDate=new Date(order.createdAt).toLocaleString();

if(order.items){

order.items.forEach(item=>{

items+=`

<div class="order-item">

<img src="/images/${item.product.imageUrl}" alt="product">

<div>
<b>${item.product.name}</b><br>
Qty: ${item.quantity}
</div>

</div>

`;

});

}

html+=`

<div class="order-card">

<h3>Order #${order.id}</h3>

<div class="order-info">
Date: ${orderDate}
</div>

${items}

<div class="total">
Total: ₹${order.totalAmount}
</div>

</div>

`;

});

}

document.getElementById("orders").innerHTML=html;

}catch(err){

document.getElementById("orders").innerHTML="<p>Error loading orders</p>";

console.error(err);

}

}

loadOrders();

</script>

</body>

</html>
