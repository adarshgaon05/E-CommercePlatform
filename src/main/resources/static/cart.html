<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>Your Cart - MyStore</title>

	<style>
		body {
			font-family: Arial, sans-serif;
			margin: 0;
			background: #f3f3f3;
		}
		nav{
		background:#222;
		color:white;
		padding:15px 30px;
		display:flex;
		justify-content:space-between;
		align-items:center;
		}

		nav a{
		color:white;
		margin-left:15px;
		text-decoration:none;
		font-weight:bold;
		}

		.container {
			padding: 30px;
		}

		.cart-wrapper {
			display: flex;
			gap: 30px;
			margin-top: 20px;
		}

		.cart-left {
			flex: 3;
		}

		.cart-right {
			flex: 1;
			background: white;
			padding: 20px;
			border-radius: 8px;
			height: fit-content;
			box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
		}

		.cart-item {
			display: flex;
			align-items: center;
			gap: 20px;
			margin-bottom: 20px;
			background: white;
			padding: 15px;
			border-radius: 8px;
			box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
		}

		.cart-item img {
			width: 120px;
			height: 120px;
			object-fit: contain;
		}

		.qty-btn {
			padding: 5px 10px;
			margin: 0 5px;
			cursor: pointer;
			background: #2874f0;
			color: white;
			border: none;
			border-radius: 4px;
		}

		.remove-btn {
			margin-top: 8px;
			background: rgb(255, 255, 255);
			color: white;
			border: none;
			padding: 5px 12px;
			cursor: pointer;
			border-radius: 4px;
		}

		.checkout-btn {
			width: 100%;
			padding: 12px;
			background: #FFD814;
			border: none;
			border-radius: 6px;
			font-weight: bold;
			cursor: pointer;
		}

		.checkout-btn:hover {
			background: #F7CA00;
		}
	</style>

</head>

<body>

	<nav>

		<h2>MyStore</h2>

		<div>
			<a href="/index.html">Home</a>
			<a href="/cart.html">Cart</a>
			<a href="#" onclick="logout()">Logout</a>
			<a href="/orders.html">Orders</a>
		</div>

	</nav>

	<div class="container">

		<div class="cart-wrapper">

			<div class="cart-left">

				<h2>Shopping Cart</h2>

				<div id="cart-items"></div>

			</div>

			<div class="cart-right">

				<h3 id="total"></h3>

				<button onclick="checkout()" class="checkout-btn">
					Proceed to Buy
				</button>

			</div>

		</div>

	</div>

	<script>

		const API = "http://localhost:8080";

		document.addEventListener("DOMContentLoaded", function () {

			const token = localStorage.getItem("token");

			if (!token) {
				window.location.href = "/login.html";
				return;
			}

			loadCart();

		});

		function loadCart() {

			fetch(API + "/api/cart", {
				headers: {
					"Authorization": "Bearer " + localStorage.getItem("token")
				}
			})

				.then(res => res.json())
				.then(cart => {

					const container = document.getElementById("cart-items");

					container.innerHTML = "";

					let total = 0;

					cart.items.forEach(item => {

						const subtotal = item.product.price * item.quantity;

						total += subtotal;

						container.innerHTML += `

<div class="cart-item">

<img src="/images/${item.product.imageUrl}" width="120">

<div>

<h4>${item.product.name}</h4>

<p>Price: ₹ ${item.product.price}</p>

<button class="qty-btn" onclick="decrease(${item.product.id})">-</button>

${item.quantity}

<button class="qty-btn" onclick="increase(${item.product.id})">+</button>

<p><b>Subtotal: ₹ ${subtotal}</b></p>

<button class="remove-btn"
onclick="removeItem(${item.product.id})">
Remove
</button>

</div>

</div>

`;

					});

					document.getElementById("total").innerText = "Subtotal: ₹ " + total;

				});

		}

		function increase(productId) {

			fetch(API + "/api/cart/increase/" + productId, {
				method: "POST",
				headers: {
					"Authorization": "Bearer " + localStorage.getItem("token")
				}
			})
				.then(() => loadCart());

		}

		function decrease(productId) {

			fetch(API + "/api/cart/decrease/" + productId, {
				method: "POST",
				headers: {
					"Authorization": "Bearer " + localStorage.getItem("token")
				}
			})
				.then(() => loadCart());

		}

		function removeItem(productId) {

			fetch(API + "/api/cart/remove/" + productId, {
				method: "DELETE",
				headers: {
					"Authorization": "Bearer " + localStorage.getItem("token")
				}
			})
				.then(() => loadCart());

		}

		function checkout() {

			const token = localStorage.getItem("token");

			fetch(API + "/api/orders/checkout", {
				method: "POST",
				headers: {
					"Authorization": "Bearer " + token
				}
			})

				.then(async res => {

					const text = await res.text();

					if (!res.ok) {
						throw new Error(text);
					}

					return text;

				})

				.then(() => {

					window.location.href = "/order_success.html";

				})

				.catch(err => {

					alert("Checkout Error: " + err.message);

				});

		}

		function logout() {

			localStorage.removeItem("token");

			window.location.href = "/login.html";

		}

	</script>

</body>

</html>
